name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Contract Tests ──────────────────────────────────────────────────────────
  contract-tests:
    name: 🦀 Soroban Contract Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts/stellar_vault

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libdbus-1-dev libudev-dev

      - name: Install Stellar CLI
        run: |
          cargo install --locked stellar-cli

      - name: Run contract unit tests
        working-directory: contracts/stellar_vault
        run: cargo test --features testutils 2>&1 | tee test-output.txt

      - name: Build contract WASM
        working-directory: contracts/stellar_vault
        run: |
          cargo build --release --target wasm32-unknown-unknown
          ls -la target/wasm32-unknown-unknown/release/*.wasm

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: contract-test-results
          path: contracts/stellar_vault/test-output.txt

  # ─── Frontend Tests ──────────────────────────────────────────────────────────
  frontend-tests:
    name: ⚡ Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Type check
        working-directory: frontend
        run: npm run type-check

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Run unit tests with coverage
        working-directory: frontend
        run: npm test -- --coverage --passWithNoTests

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: frontend/coverage/

  # ─── Build & Preview ─────────────────────────────────────────────────────────
  build:
    name: 🏗️ Build Frontend
    runs-on: ubuntu-latest
    needs: [frontend-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build production bundle
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_NETWORK: testnet
          NEXT_PUBLIC_VAULT_CONTRACT: ${{ vars.VAULT_CONTRACT_ADDRESS }}
          NEXT_PUBLIC_ORACLE_CONTRACT: ${{ vars.ORACLE_CONTRACT_ADDRESS }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: frontend/.next/

  # ─── Deploy to Vercel ────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [build, contract-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && secrets.VERCEL_TOKEN != ''

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel production
        working-directory: frontend
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ─── Contract Deployment ─────────────────────────────────────────────────────
  deploy-contract:
    name: 📡 Deploy Contracts
    runs-on: ubuntu-latest
    needs: [contract-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && secrets.STELLAR_SECRET_KEY != ''

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libdbus-1-dev libudev-dev

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli

      - name: Build WASM
        working-directory: contracts/stellar_vault
        run: cargo build --release --target wasm32-unknown-unknown

      - name: Deploy to Testnet
        run: |
          chmod +x scripts/deploy.sh
          ./scripts/deploy.sh testnet
        env:
          STELLAR_SECRET_KEY: ${{ secrets.STELLAR_SECRET_KEY }}
        continue-on-error: true
